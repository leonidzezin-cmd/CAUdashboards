<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EduAnalysis Uzbekistan 2026</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; margin: 0; padding: 40px; }
        h1 { text-align: center; color: #0f172a; margin-bottom: 40px; font-size: 2.5em; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.3s ease; border: 1px solid #e2e8f0; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: var(--primary); }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(37, 99, 235, 0.1); border-color: var(--primary); }
        .card h3 { margin: 0 0 10px 0; font-size: 1.25em; color: #1e293b; }
        .card .stat { font-size: 2em; font-weight: 800; color: var(--primary); margin: 15px 0; }
        .tag { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; background: #dbeafe; color: #1e40af; padding: 4px 12px; border-radius: 9999px; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 100; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 800px; max-height: 85vh; background: white; border-radius: 24px; padding: 40px; z-index: 101; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-header { border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; margin-bottom: 25px; }
        .modal-title { font-size: 2em; font-weight: 800; color: #0f172a; margin: 0; }
        .modal-content { font-size: 1.1em; color: #475569; }
        .modal-content b { color: #0f172a; }
        .modal-content ul { padding-left: 20px; }
        .modal-content li { margin-bottom: 10px; }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #94a3b8; }
        .close-btn:hover { color: #1e293b; }
        .source-link { display: inline-flex; align-items: center; margin-top: 30px; padding: 12px 24px; background: var(--primary); color: white; text-decoration: none; border-radius: 12px; font-weight: 600; transition: background 0.2s; }
        .source-link:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<h1>📊 Higher Education Trends Uzbekistan 2026</h1>

<div class="grid" id="trendGrid"></div>

<div id="overlay" onclick="closeModal()"></div>
<div id="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-header">
        <h2 class="modal-title" id="mTitle"></h2>
    </div>
    <div class="modal-content" id="mContent"></div>
    <div id="mLink"></div>
</div>

<script>
const trends = [
    {
        title: "Доступность и «фильтрация» потока",
        stat: "45% Охват",
        tag: "Демография",
        desc: `<b>Суть тренда:</b> Государство достигло цели в 1,5 млн студентов, но в сезоне 2025-26 стратегия сменилась с «количества» на «селективность». <br><br>
               <b>Ключевые факты:</b>
               <ul>
                <li>Около <b>400 000 выпускников школ</b> теперь направляются напрямую в техникумы и колледжи, минуя вузовский этап.</li>
                <li>Это позволило снизить наплыв в вузы, сделав высшее образование более осознанным и качественным.</li>
                <li><b>Цифра:</b> Число абитуриентов в госвузы в 2025/26 снизилось до 732 тыс. чел. (минимум за 7 лет).</li>
               </ul>`,
        link: "https://www.uzdaily.uz/ru/2026-i-god-obucheniia-molodezhi-sovremennym-professiiam/"
    },
    {
        title: "Взлет частного сектора",
        stat: "99 Вузов",
        tag: "Рынок",
        desc: `<b>Суть тренда:</b> Полная демонополизация рынка. Частный сектор перестал быть «запасным вариантом» и стал основным конкурентом государства.<br><br>
               <b>Ключевые факты:</b>
               <ul>
                <li>Количество негосударственных вузов выросло до <b>99</b> (в 2017 году их было всего 1).</li>
                <li>Частные вузы забирают на себя почти <b>50% первокурсников</b>, особенно в бизнес-образовании и медицине.</li>
                <li>Происходит консолидация: мелкие игроки закрываются, крупные (как Kimyo, UTAS, ISFT) превращаются в сетевые гиганты.</li>
               </ul>`,
        link: "https://review.uz/post/infografika-2017-2024-yillarda-talim-sohasini-rivojlantirishning-asosiy-korsatkichlari"
    },
    {
        title: "Региональная децентрализация",
        stat: "7 Городков",
        tag: "География",
        desc: `<b>Суть тренда:</b> Ташкент перестает быть моно-центром. Создается инфраструктура для удержания талантов в областях.<br><br>
               <b>Ключевые факты:</b>
               <ul>
                <li>В 2026 году акцент смещен на регионы: в 7 областях запущены <b>«Городки профессий»</b>.</li>
                <li><b>Узкая специализация:</b> Навои превращается в хаб искусственного интеллекта, Ферганская долина — в текстильно-образовательный кластер.</li>
                <li>Цель — снизить миграционную нагрузку на столицу и обеспечить кадрами региональные промышленные узлы.</li>
               </ul>`,
        link: "https://www.gazeta.uz/ru/2026/02/11/principle/"
    },
    {
        title: "Диктатура качества (Регуляции)",
        stat: "Запрет Sirtqi",
        tag: "Контроль",
        desc: `<b>Суть тренда:</b> Самый жесткий регуляторный сезон за 10 лет. Качество образования теперь измеряется цифрами, а не обещаниями.<br><br>
               <b>Ключевые факты:</b>
               <ul>
                <li><b>Полный запрет заочки:</b> С 2025/26 года форма «sirtqi» ликвидирована.</li>
                <li><b>Нацрейтинг (Март 2026):</b> Внедрена система 25 индикаторов. Вузы, занимающие последние места 3 года подряд, автоматически теряют лицензию.</li>
                <li><b>Face ID:</b> Дистанционное обучение теперь контролируется биометрией для исключения подделки результатов тестов.</li>
               </ul>`,
        link: "https://www.gazeta.uz/ru/2025/06/26/students/"
    },
    {
        title: "AI-Трансформация",
        stat: "5 млн Лидеров",
        tag: "Технологии",
        desc: `<b>Суть тренда:</b> Масштабное внедрение ИИ не как отдельного предмета, а как сквозной компетенции.<br><br>
               <b>Ключевые факты:</b>
               <ul>
                <li>Программа <b>«5 миллионов лидеров ИИ»</b>: к маю 2026 курсы Coursera/edX по ИИ полностью переведены на узбекский.</li>
                <li>Обязательные модули по Генеративному ИИ внедрены во все программы (от медиков до юристов).</li>
                <li>Вузы-лидеры получают гранты в виде электромобилей и вычислительных мощностей за успехи в ИИ-исследованиях.</li>
               </ul>`,
        link: "https://fergana.agency/news/144419/"
    },
    {
        title: "Смена лидеров спроса",
        stat: "IT +22%",
        tag: "Специализации",
        desc: `<b>Суть тренда:</b> Абитуриенты стали прагматичнее. Спрос смещается от «престижных» корочек к навыкам будущего.<br><br>
               <b>Ключевые факты:</b>
               <ul>
                <li><b>Растут:</b> Кибербезопасность, Инженерия ИИ, Зеленая энергетика, Специализированная медицина.</li>
                <li><b>Стагнируют:</b> Традиционная юриспруденция и филология без IT-компонента (наблюдается перенасыщение рынка специалистами общего профиля).</li>
                <li>Прогноз: К 2028 году 60% вакансий в РУз будут требовать навыки работы с ИИ.</li>
               </ul>`,
        link: "https://www.digital.gov.uz/ru/edu/news/view/138354"
    },
    {
        title: "Экономика и Стоимость",
        stat: "7.4 млн Мин.",
        tag: "Финансы",
        desc: `<b>Суть тренда:</b> Стабилизация цен в госвузах и борьба за лояльность в частных.<br><br>
               <b>Ключевые факты:</b>
               <ul>
                <li>Минимальный контракт в госвузах зафиксирован на уровне <b>7.4 млн сумов</b>.</li>
                <li><b>Финансовая гибкость:</b> Частные вузы массово переходят на модель 12-месячной рассрочки без участия банков.</li>
                <li>Появились «пакетные» предложения для иностранцев: учеба + проживание за $1000–1600 в год.</li>
               </ul>`,
        link: "https://advice.uz/ru/news/2364"
    },
    {
        title: "Международная интеграция",
        stat: "7 в Top-1000",
        tag: "Глобализация",
        desc: `<b>Суть тренда:</b> Узбекистан выходит из изоляции и интегрируется в мировое академическое пространство.<br><br>
               <b>Ключевые факты:</b>
               <ul>
                <li>В рейтинге <b>QS 2026</b> сразу 7 вузов Узбекистана вошли в ТОП-1000.</li>
                <li><b>Центр ЮНЕСКО (Март 2026):</b> В Ташкенте создается хаб для глобального мониторинга образования и взаимного признания дипломов.</li>
                <li>Активный рост программ «двойных дипломов» с вузами Германии, Кореи и Турции.</li>
               </ul>`,
        link: "https://nuu.uz/ru/qs-sustainability-rankings-2026-ozmu-top-1000-talikda/"
    },
    {
        title: "Дуальное обучение",
        stat: "5x Охват",
        tag: "Практика",
        desc: `<b>Суть тренда:</b> Обучение молодежи современным профессиям через практику на реальных объектах.<br><br>
               <b>Ключевые факты:</b>
               <ul>
                <li>Модель <b>«2 дня теории + 4 дня на производстве»</b> показала 5-кратный рост охвата в 2026 году.</li>
                <li>Вузы подписывают прямые контракты с индустриальными кластерами, где студенты получают зарплату уже со 2 курса.</li>
                <li>Техникумы стали основными площадками для этого эксперимента.</li>
               </ul>`,
        link: "https://www.uzdaily.uz/ru/2026-i-god-obucheniia-molodezhi-sovremennym-professiiam/"
    },
    {
        title: "Зеленые инициативы (ESG)",
        stat: "Sustainability",
        tag: "Эко-тренд",
        desc: `<b>Суть тренда:</b> Вузы начали использовать «зеленую повестку» для привлечения международных инвестиций и грантов.<br><br>
               <b>Ключевые факты:</b>
               <ul>
                <li>Лидер тренда — <b>НУУ</b>, показавший резкий рост в рейтинге QS Sustainability.</li>
                <li>Внедрение ESG-стандартов (устойчивое развитие) стало обязательным пунктом стратегии развития ТОП-вузов.</li>
                <li>Гранты на исследования в области климата и зеленой энергии выросли на 30% за последние полгода.</li>
               </ul>`,
        link: "https://nuu.uz/ru/qs-sustainability-rankings-2026-ozmu-top-1000-talikda/"
    }
];

const grid = document.getElementById('trendGrid');
trends.forEach(t => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(t);
    card.innerHTML = `
        <span class="tag">${t.tag}</span>
        <h3>${t.title}</h3>
        <div class="stat">${t.stat}</div>
        <p style="color:#64748b; font-size:0.9em;">Нажми для подробного анализа и фактов →</p>
    `;
    grid.appendChild(card);
});

function openModal(t) {
    document.getElementById('mTitle').innerText = t.title;
    document.getElementById('mContent').innerHTML = t.desc;
    document.getElementById('mLink').innerHTML = `<a href="${t.link}" target="_blank" class="source-link">Открыть первоисточник ↗</a>`;
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('modal').style.display = 'block';
}

function closeModal() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('modal').style.display = 'none';
}
</script>
</body>
</html>
